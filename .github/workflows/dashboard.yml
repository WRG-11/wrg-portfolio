name: dashboard

# WRG-11 portfolio dashboard -- regenerate docs/index.html daily from
# upstream PyPI + pypistats + GitHub APIs and commit the result to main.
# GitHub Pages serves docs/ from main, so a successful run = a refreshed
# public page within a few minutes.
#
# - Cron: daily 07:00 UTC (1h after the sentry cron so that newly-shipped
#   GitHub Releases catch up before we snapshot).
# - workflow_dispatch: manual refresh for ad-hoc updates after a release.

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:
  # R89-60f Feature 5: push trigger so that edits to the generator script or
  # config auto-regenerate the dashboard without waiting for the next cron.
  # Path filter ensures the workflow only fires on generator/config changes —
  # not on the generated docs/index.html commit (preventing the cron→push loop).
  # The workflow's auto-commit uses GITHUB_TOKEN which GitHub treats as a bot push;
  # by convention those do not re-trigger workflows, but the path filter is a
  # belt-and-suspenders guard regardless.
  #
  # BILLING GATE (R89-60f): GitHub Actions is currently disabled (billing-suspended
  # R88-51). This trigger is present but inactive. Operator action to re-enable:
  #   Settings → Billing & Plans → GitHub Actions → re-enable
  # Once re-enabled, the push trigger activates automatically on the next
  # push to main that modifies scripts/dashboard.py or config/sentry-targets.json.
  push:
    branches: [main]
    paths:
      - 'scripts/dashboard.py'
      - 'config/sentry-targets.json'

permissions:
  contents: write

jobs:
  dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Generate dashboard
        env:
          # R89-18a fix #1: PAT with cross-org code-scanning:read access
          # so dashboard.py can fetch CodeQL alert counts for every WRG-11
          # repo (anonymous GitHub API returns HTTP 401 for code-scanning/
          # alerts even on public repos with public-visibility alerts).
          # Falls back to anonymous if the secret is unset, which surfaces
          # "?" in the CodeQL column rather than failing the build.
          # Operator note: create a fine-grained PAT scoped to WRG-11 org
          # with permission "Code scanning alerts: Read" and add as repo
          # secret GH_DASHBOARD_TOKEN. Classic PAT with `repo` scope also
          # works (broader; less preferred).
          GH_DASHBOARD_TOKEN: ${{ secrets.GH_DASHBOARD_TOKEN }}
        run: |
          python scripts/dashboard.py \
            --config config/sentry-targets.json \
            --out docs/index.html

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain docs/index.html)" ]]; then
            git add docs/index.html
            git commit -m "dashboard: daily refresh ($(date -u +%Y-%m-%d))"
            git push origin main
            echo "dashboard refreshed and committed"
          else
            echo "no dashboard changes -- upstream snapshot unchanged"
          fi
